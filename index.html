<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registre des Peines</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #222120;
    --border: #2e2d2a;
    --accent: #c9a96e;
    --accent2: #8b6f3e;
    --text: #e8e4dc;
    --muted: #7a7570;
    --danger: #c0392b;
    --danger-bg: #2a1210;
    --success: #4caf7d;
    --light-peine: #1a2e3d;
    --light-peine-text: #6ab0d4;
    --med-peine: #2e2510;
    --med-peine-text: #d4a84b;
    --heavy-peine: #2a1010;
    --heavy-peine-text: #d46b6b;
    --font-display: 'Crimson Pro', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .logo span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 10px; }

  .sync-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }

  /* STATS */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stat-item {
    flex: 1;
    padding: 1rem 1.5rem;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
  }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* ADD FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .form-title {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .f-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .f-group label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .f-group input, .f-group select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 8px 12px;
    height: 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  .f-group input:focus, .f-group select:focus {
    border-color: var(--accent);
  }

  .f-group.f-nom { flex: 2; min-width: 180px; }
  .f-group.f-delit { flex: 2; min-width: 150px; }
  .f-group.f-num { width: 90px; }
  .f-group.f-unit { width: 100px; }

  .btn-primary {
    height: 38px;
    padding: 0 20px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #d4b483; }

  .err-msg {
    margin-top: 10px;
    font-size: 13px;
    color: #e07070;
    display: none;
  }

  /* SEARCH */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .search-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 8px 14px;
    height: 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-row input:focus { border-color: var(--accent2); }

  .count-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* TABLE */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-weight: 500;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 10px 12px;
    vertical-align: middle;
    color: var(--text);
  }

  .td-num { color: var(--muted); font-size: 11px; width: 32px; }
  .td-nom { font-weight: 500; font-size: 14px; font-family: var(--font-display); color: var(--accent); }

  /* BADGES */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    margin: 2px 2px 2px 0;
    font-family: var(--font-mono);
    border: 1px solid;
  }

  .badge-light { background: var(--light-peine); color: var(--light-peine-text); border-color: #2a4a5e; }
  .badge-med { background: var(--med-peine); color: var(--med-peine-text); border-color: #4a3c18; }
  .badge-heavy { background: var(--heavy-peine); color: var(--heavy-peine-text); border-color: #4a2020; }

  .total-tag {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  /* INLINE ADD */
  .add-inline {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .add-inline input, .add-inline select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 3px 6px;
    height: 28px;
    outline: none;
  }

  .add-inline input[type="text"] { width: 80px; }
  .add-inline input[type="number"] { width: 50px; }
  .add-inline select { width: 55px; }

  .add-inline input:focus, .add-inline select:focus { border-color: var(--accent2); }

  .btn-small {
    height: 28px;
    padding: 0 10px;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-small:hover { background: var(--accent2); color: var(--bg); }

  .btn-del {
    height: 28px;
    padding: 0 10px;
    background: transparent;
    border: 1px solid #3a1a1a;
    color: #c06060;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-del:hover { background: var(--danger-bg); border-color: var(--danger); color: #e08080; }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 14px;
    border: 1px dashed var(--border);
  }

  .empty-state .icon {
    font-family: var(--font-display);
    font-size: 40px;
    color: var(--border);
    display: block;
    margin-bottom: 1rem;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 700px) {
    .main { padding: 1rem; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
    .form-row { flex-direction: column; }
    .f-group { width: 100% !important; min-width: unset !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⚖ Registre des Peines <span>Roleplay Judiciaire</span></div>
  <div class="sync-dot">
    <div class="dot" id="dot"></div>
    <span id="sync-label">Connexion...</span>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-label">Condamnés</div>
    <div class="stat-value" id="stat-total">—</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Peines prononcées</div>
    <div class="stat-value" id="stat-peines">—</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Durée cumulée</div>
    <div class="stat-value" id="stat-duree">—</div>
  </div>
</div>

<div class="main">

  <div class="form-card">
    <div class="form-title">Prononcer une peine</div>
    <div class="form-row">
      <div class="f-group f-nom">
        <label>Nom complet du condamné</label>
        <input type="text" id="inp-nom" placeholder="Prénom Nom" autocomplete="off" />
      </div>
      <div class="f-group f-delit">
        <label>Chef d'inculpation</label>
        <input type="text" id="inp-delit" placeholder="Ex: Vol, Fraude..." />
      </div>
      <div class="f-group f-num">
        <label>Durée</label>
        <input type="number" id="inp-val" min="1" max="999" placeholder="12" />
      </div>
      <div class="f-group f-unit">
        <label>Unité</label>
        <select id="inp-unit">
          <option value="mois">Mois</option>
          <option value="ans">Ans</option>
          <option value="jours">Jours</option>
        </select>
      </div>
      <button class="btn-primary" onclick="ajouterPersonne()">+ Condamner</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
  </div>

  <div class="search-row">
    <input type="text" id="search" placeholder="Rechercher un condamné par nom..." oninput="renderTable()" />
    <span class="count-label" id="count-label">0 condamné(s)</span>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading-msg">Connexion à la base de données...</div>
    <table id="main-table" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Condamné</th>
          <th>Délits / Peines</th>
          <th>Nb</th>
          <th>Total</th>
          <th>Ajouter peine</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-msg" style="display:none;">
      <span class="icon">⚖</span>
      Aucun condamné enregistré pour le moment.
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDwWDXR4BMXfqGbYLiPhdJfJqabVZqhIr8",
    authDomain: "registre-peines.firebaseapp.com",
    databaseURL: "https://registre-peines-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "registre-peines",
    storageBucket: "registre-peines.firebasestorage.app",
    messagingSenderId: "328829701434",
    appId: "1:328829701434:web:486dd28b88210ac59a9403"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'condamnes');

  let data = {};

  function setLive(ok) {
    document.getElementById('dot').className = 'dot' + (ok ? ' live' : '');
    document.getElementById('sync-label').textContent = ok ? 'En direct' : 'Hors ligne';
  }

  onValue(dbRef, (snapshot) => {
    data = snapshot.val() || {};
    setLive(true);
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('main-table').style.display = 'table';
    renderTable();
    updateStats();
  }, () => setLive(false));

  function toMois(val, unit) {
    if (unit === 'ans') return val * 12;
    if (unit === 'jours') return Math.round(val / 30 * 10) / 10;
    return val;
  }

  function formatTotal(mois) {
    mois = Math.round(mois);
    if (mois >= 24) {
      const ans = Math.floor(mois / 12);
      const reste = mois % 12;
      return reste > 0 ? ans + ' ans ' + reste + ' mois' : ans + ' ans';
    }
    return mois + ' mois';
  }

  function badgeClass(mois) {
    if (mois < 12) return 'badge-light';
    if (mois < 60) return 'badge-med';
    return 'badge-heavy';
  }

  function nomNorm(n) { return n.trim().toLowerCase().replace(/\s+/g, ' '); }

  function showErr(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', 3500);
  }

  window.ajouterPersonne = function() {
    const nom = document.getElementById('inp-nom').value.trim();
    const delit = document.getElementById('inp-delit').value.trim();
    const val = parseFloat(document.getElementById('inp-val').value);
    const unit = document.getElementById('inp-unit').value;

    if (!nom) return showErr('Veuillez entrer un nom complet.');
    if (!delit) return showErr('Veuillez indiquer le chef d\'inculpation.');
    if (!val || val <= 0) return showErr('Durée invalide.');

    const normNom = nomNorm(nom);
    const doublon = Object.values(data).find(d => nomNorm(d.nom) === normNom);
    if (doublon) return showErr('Ce condamné existe déjà ! Utilisez "+ Peine" sur sa ligne pour ajouter une peine.');

    const nomFormate = nom.replace(/\b\w/g, c => c.toUpperCase());
    push(dbRef, {
      nom: nomFormate,
      peines: [{ delit, val, unit }],
      date: new Date().toLocaleDateString('fr-FR')
    });

    document.getElementById('inp-nom').value = '';
    document.getElementById('inp-delit').value = '';
    document.getElementById('inp-val').value = '';
  };

  window.ajouterPeine = function(key) {
    const delitEl = document.getElementById('ad-' + key);
    const valEl = document.getElementById('av-' + key);
    const unitEl = document.getElementById('au-' + key);
    const val = parseFloat(valEl.value);
    const unit = unitEl.value;
    const delit = delitEl.value.trim() || 'Non précisé';
    if (!val || val <= 0) return;

    const entry = data[key];
    const peines = entry.peines ? [...entry.peines, { delit, val, unit }] : [{ delit, val, unit }];
    update(ref(db, 'condamnes/' + key), { peines });
    valEl.value = '';
    delitEl.value = '';
  };

  window.supprimerPersonne = function(key) {
    if (confirm('Supprimer ce condamné du registre ?')) {
      remove(ref(db, 'condamnes/' + key));
    }
  };

  function updateStats() {
    const entries = Object.values(data);
    document.getElementById('stat-total').textContent = entries.length;
    const totalP = entries.reduce((s, d) => s + (d.peines ? d.peines.length : 0), 0);
    document.getElementById('stat-peines').textContent = totalP;
    const totalM = entries.reduce((s, d) => {
      return s + (d.peines ? d.peines.reduce((ss, p) => ss + toMois(p.val, p.unit), 0) : 0);
    }, 0);
    document.getElementById('stat-duree').textContent = formatTotal(totalM);
  }

  window.renderTable = function() {
    const q = document.getElementById('search').value.toLowerCase();
    const entries = Object.entries(data).filter(([k, d]) => d.nom.toLowerCase().includes(q));
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty-msg');
    const table = document.getElementById('main-table');

    document.getElementById('count-label').textContent = entries.length + ' condamné(s)';

    if (entries.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      table.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    table.style.display = 'table';

    tbody.innerHTML = entries.map(([key, d], i) => {
      const peines = d.peines || [];
      const moisTotal = peines.reduce((s, p) => s + toMois(p.val, p.unit), 0);
      const peinesHtml = peines.map(p =>
        `<span class="badge ${badgeClass(toMois(p.val, p.unit))}">${p.delit}: ${p.val} ${p.unit}</span>`
      ).join('');

      return `<tr>
        <td class="td-num">${i + 1}</td>
        <td class="td-nom">${d.nom}<br><span style="font-size:11px;color:var(--muted);font-family:var(--font-mono);font-weight:400;">${d.date || ''}</span></td>
        <td>${peinesHtml}</td>
        <td style="color:var(--muted);font-size:12px;">${peines.length}</td>
        <td><span class="total-tag">${formatTotal(moisTotal)}</span></td>
        <td>
          <div class="add-inline">
            <input type="text" id="ad-${key}" placeholder="Délit" />
            <input type="number" id="av-${key}" min="1" placeholder="N" />
            <select id="au-${key}"><option value="mois">Mois</option><option value="ans">Ans</option><option value="jours">Jours</option></select>
            <button class="btn-small" onclick="ajouterPeine('${key}')">+ Peine</button>
          </div>
        </td>
        <td><button class="btn-del" onclick="supprimerPersonne('${key}')">✕</button></td>
      </tr>`;
    }).join('');
  };
</script>
</body>
</html>
