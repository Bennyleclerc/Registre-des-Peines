<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registre des Peines</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #222120;
    --border: #2e2d2a;
    --accent: #c9a96e;
    --accent2: #8b6f3e;
    --text: #e8e4dc;
    --muted: #7a7570;
    --danger: #c0392b;
    --danger-bg: #2a1210;
    --success: #4caf7d;
    --success-bg: #0f2a1a;
    --warning: #d4a84b;
    --warning-bg: #2a1e08;
    --light-peine: #1a2e3d;
    --light-peine-text: #6ab0d4;
    --med-peine: #2e2510;
    --med-peine-text: #d4a84b;
    --heavy-peine: #2a1010;
    --heavy-peine-text: #d46b6b;
    --font-display: 'Crimson Pro', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2rem; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 200;
  }
  .logo { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--accent); }
  .logo span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 10px; }
  .sync-dot { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }

  .stats-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .stat-item { flex: 1; padding: 1rem 1.5rem; border-right: 1px solid var(--border); text-align: center; }
  .stat-item:last-child { border-right: none; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 600; color: var(--accent); }

  .main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 2px solid var(--accent); padding: 1.5rem; margin-bottom: 2rem;
  }
  .form-title { font-family: var(--font-display); font-size: 16px; color: var(--accent); margin-bottom: 1rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .f-group { display: flex; flex-direction: column; gap: 5px; position: relative; }
  .f-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .f-group input, .f-group select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 14px; padding: 8px 12px;
    height: 38px; outline: none; transition: border-color 0.2s;
  }
  .f-group input:focus, .f-group select:focus { border-color: var(--accent); }
  .f-group.f-nom { flex: 2; min-width: 200px; }
  .f-group.f-delit { flex: 2; min-width: 150px; }
  .f-group.f-num { width: 90px; }
  .f-group.f-unit { width: 100px; }

  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 300;
    background: var(--surface2); border: 1px solid var(--accent2);
    border-top: none; max-height: 200px; overflow-y: auto; display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 9px 12px; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid var(--border); color: var(--text); transition: background 0.12s;
    display: flex; align-items: center; gap: 8px;
  }
  .autocomplete-item:hover, .autocomplete-item.selected { background: var(--accent2); color: var(--bg); }
  .tag-existing { font-size: 10px; background: var(--med-peine); color: var(--med-peine-text); padding: 1px 6px; border: 1px solid #4a3c18; }

  .btn-primary {
    height: 38px; padding: 0 20px; background: var(--accent); color: var(--bg);
    border: none; font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: background 0.2s; white-space: nowrap;
  }
  .btn-primary:hover { background: #d4b483; }
  .err-msg { margin-top: 10px; font-size: 13px; color: #e07070; display: none; }

  .search-row { display: flex; gap: 10px; margin-bottom: 1.5rem; align-items: center; }
  .search-row input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 14px; padding: 8px 14px; height: 38px; outline: none;
  }
  .search-row input:focus { border-color: var(--accent2); }
  .count-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; padding: 10px 12px; border-bottom: 1px solid var(--border);
    background: var(--surface); font-weight: 500;
  }
  tbody tr.main-row { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
  tbody tr.main-row:hover { background: var(--surface2); }
  tbody td { padding: 10px 12px; vertical-align: middle; color: var(--text); }

  .td-num { color: var(--muted); font-size: 11px; width: 32px; }
  .td-nom { font-weight: 500; font-size: 15px; font-family: var(--font-display); color: var(--accent); }
  .td-nom .date-sub { font-size: 11px; color: var(--muted); font-family: var(--font-mono); font-weight: 400; }

  /* Badges peines dans la liste principale */
  .badge {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    margin: 2px 2px 2px 0; font-family: var(--font-mono); border: 1px solid;
  }
  .badge-light { background: var(--light-peine); color: var(--light-peine-text); border-color: #2a4a5e; }
  .badge-med   { background: var(--med-peine);   color: var(--med-peine-text);   border-color: #4a3c18; }
  .badge-heavy { background: var(--heavy-peine);  color: var(--heavy-peine-text); border-color: #4a2020; }
  .badge-done  { background: #111; color: var(--muted); border-color: #2a2a2a; text-decoration: line-through; opacity: 0.6; }

  /* Total restant vs total global */
  .total-wrap { display: flex; flex-direction: column; gap: 2px; }
  .total-restant { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--accent); }
  .total-sub { font-size: 11px; color: var(--muted); }

  .toggle-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font-mono); font-size: 12px; padding: 4px 10px; cursor: pointer;
    transition: all 0.15s; user-select: none; white-space: nowrap;
  }
  .toggle-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .toggle-btn.open { border-color: var(--accent2); color: var(--accent); }

  /* DETAIL ROW */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell { padding: 0 !important; border-bottom: 2px solid var(--accent2) !important; }
  .detail-inner { background: #131210; padding: 1.5rem; display: flex; gap: 2rem; flex-wrap: wrap; align-items: flex-start; }

  /* PEINES DETAIL */
  .peines-block { flex: 3; min-width: 280px; }
  .block-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }

  .peine-line {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border: 1px solid var(--border);
    margin-bottom: 6px; background: var(--surface); transition: background 0.15s;
  }
  .peine-line.done { opacity: 0.5; background: #111; }

  .peine-delit { flex: 1; font-size: 13px; color: var(--text); }
  .peine-delit.done-text { text-decoration: line-through; color: var(--muted); }
  .peine-duree { font-size: 13px; color: var(--accent); white-space: nowrap; }
  .peine-duree.done-text { color: var(--muted); text-decoration: line-through; }

  .peine-status-badge {
    font-size: 10px; padding: 2px 8px; border: 1px solid; white-space: nowrap; cursor: default;
  }
  .psb-encours { background: var(--warning-bg); color: var(--warning); border-color: #4a3c18; }
  .psb-effectuee { background: var(--success-bg); color: var(--success); border-color: #1a4a2a; }

  .btn-toggle-peine {
    font-size: 11px; padding: 3px 10px; border: 1px solid; cursor: pointer;
    font-family: var(--font-mono); background: transparent; white-space: nowrap; transition: all 0.15s;
  }
  .btn-toggle-peine.to-done { border-color: var(--success); color: var(--success); }
  .btn-toggle-peine.to-done:hover { background: var(--success-bg); }
  .btn-toggle-peine.to-encours { border-color: var(--warning); color: var(--warning); }
  .btn-toggle-peine.to-encours:hover { background: var(--warning-bg); }

  /* RÉSUMÉ TOTAL dans le détail */
  .total-detail-box {
    margin-top: 12px; padding: 10px 14px;
    border: 1px solid var(--border); background: var(--bg);
    display: flex; gap: 2rem; flex-wrap: wrap;
  }
  .tdb-item { display: flex; flex-direction: column; gap: 2px; }
  .tdb-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .tdb-val { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
  .tdb-val.col-total { color: var(--muted); }
  .tdb-val.col-done { color: var(--success); }
  .tdb-val.col-rest { color: var(--accent); }

  /* ADD PEINE */
  .add-block { flex: 2; min-width: 260px; }
  .add-inline { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .add-inline input, .add-inline select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 12px; padding: 5px 8px; height: 32px; outline: none;
  }
  .add-inline input[type="text"] { width: 110px; }
  .add-inline input[type="number"] { width: 60px; }
  .add-inline select { width: 70px; }
  .add-inline input:focus, .add-inline select:focus { border-color: var(--accent2); }
  .btn-small {
    height: 32px; padding: 0 12px; background: transparent; border: 1px solid var(--accent2);
    color: var(--accent); font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: background 0.15s;
  }
  .btn-small:hover { background: var(--accent2); color: var(--bg); }
  .btn-del {
    height: 32px; padding: 0 10px; background: transparent; border: 1px solid #3a1a1a;
    color: #c06060; font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: background 0.15s;
  }
  .btn-del:hover { background: var(--danger-bg); border-color: var(--danger); color: #e08080; }

  /* NOTES */
  .notes-block { flex: 2; min-width: 200px; }
  .notes-block textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 12px; padding: 8px; resize: vertical;
    min-height: 72px; outline: none; line-height: 1.5;
  }
  .notes-block textarea:focus { border-color: var(--accent2); }
  .btn-save-note {
    margin-top: 6px; height: 28px; padding: 0 12px; background: transparent;
    border: 1px solid var(--accent2); color: var(--accent); font-family: var(--font-mono);
    font-size: 11px; cursor: pointer; transition: background 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .btn-save-note:hover { background: var(--accent2); color: var(--bg); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 14px; border: 1px dashed var(--border); }
  .empty-state .icon { font-family: var(--font-display); font-size: 40px; color: var(--border); display: block; margin-bottom: 1rem; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }

  @media (max-width: 700px) {
    .main { padding: 1rem; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
    .form-row { flex-direction: column; }
    .f-group { width: 100% !important; min-width: unset !important; }
    .detail-inner { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⚖ Registre des Peines <span>Roleplay Judiciaire</span></div>
  <div class="sync-dot">
    <div class="dot" id="dot"></div>
    <span id="sync-label">Connexion...</span>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">Condamnés</div><div class="stat-value" id="stat-total">—</div></div>
  <div class="stat-item"><div class="stat-label">Peines totales</div><div class="stat-value" id="stat-peines">—</div></div>
  <div class="stat-item"><div class="stat-label">Temps restant cumulé</div><div class="stat-value" id="stat-restant">—</div></div>
  <div class="stat-item"><div class="stat-label">Temps purgé cumulé</div><div class="stat-value" id="stat-purge">—</div></div>
</div>

<div class="main">
  <div class="form-card">
    <div class="form-title">Prononcer une peine</div>
    <div class="form-row">
      <div class="f-group f-nom" id="nom-group">
        <label>Nom complet du condamné</label>
        <input type="text" id="inp-nom" placeholder="Prénom Nom" autocomplete="off" oninput="onNomInput()" onkeydown="onNomKey(event)" />
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
      <div class="f-group f-delit">
        <label>Chef d'inculpation</label>
        <input type="text" id="inp-delit" placeholder="Ex: Vol, Fraude..." />
      </div>
      <div class="f-group f-num">
        <label>Durée</label>
        <input type="number" id="inp-val" min="1" max="999" placeholder="12" />
      </div>
      <div class="f-group f-unit">
        <label>Unité</label>
        <select id="inp-unit">
          <option value="mois">Mois</option>
          <option value="ans">Ans</option>
          <option value="jours">Jours</option>
        </select>
      </div>
      <button class="btn-primary" onclick="ajouterOuCumuler()">+ Condamner</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
  </div>

  <div class="search-row">
    <input type="text" id="search" placeholder="Rechercher un condamné par nom..." oninput="renderTable()" />
    <span class="count-label" id="count-label">0 condamné(s)</span>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading-msg">Connexion à la base de données...</div>
    <table id="main-table" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Condamné</th>
          <th>Peines</th>
          <th>Restant à purger</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-msg" style="display:none;">
      <span class="icon">⚖</span>Aucun condamné enregistré.
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDwWDXR4BMXfqGbYLiPhdJfJqabVZqhIr8",
    authDomain: "registre-peines.firebaseapp.com",
    databaseURL: "https://registre-peines-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "registre-peines",
    storageBucket: "registre-peines.firebasestorage.app",
    messagingSenderId: "328829701434",
    appId: "1:328829701434:web:486dd28b88210ac59a9403"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'condamnes');
  let data = {};
  let acIndex = -1;

  function setLive(ok) {
    document.getElementById('dot').className = 'dot' + (ok ? ' live' : '');
    document.getElementById('sync-label').textContent = ok ? 'En direct' : 'Hors ligne';
  }

  onValue(dbRef, (snap) => {
    data = snap.val() || {};
    setLive(true);
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('main-table').style.display = 'table';
    renderTable();
    updateStats();
  }, () => setLive(false));

  /* ── UTILS ── */
  function toMois(val, unit) {
    if (unit === 'ans') return val * 12;
    if (unit === 'jours') return Math.round(val / 30 * 10) / 10;
    return parseFloat(val);
  }

  function formatTotal(mois) {
    mois = Math.round(mois);
    if (mois <= 0) return '0 mois';
    if (mois >= 24) {
      const ans = Math.floor(mois / 12);
      const reste = mois % 12;
      return reste > 0 ? ans + ' ans ' + reste + ' mois' : ans + ' ans';
    }
    return mois + ' mois';
  }

  function badgeClass(mois) {
    if (mois < 12) return 'badge-light';
    if (mois < 60) return 'badge-med';
    return 'badge-heavy';
  }

  function nomNorm(n) { return n.trim().toLowerCase().replace(/\s+/g, ' '); }

  function calcTotaux(peines) {
    let total = 0, purge = 0, restant = 0;
    (peines || []).forEach(p => {
      const m = toMois(p.val, p.unit);
      total += m;
      if (p.effectuee) purge += m; else restant += m;
    });
    return { total, purge, restant };
  }

  function showErr(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg; el.style.display = 'block';
    clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', 3500);
  }

  /* ── AUTOCOMPLETE ── */
  window.onNomInput = function() {
    const q = nomNorm(document.getElementById('inp-nom').value);
    const list = document.getElementById('autocomplete-list');
    const nomEl = document.getElementById('inp-nom');
    delete nomEl.dataset.existingKey;
    acIndex = -1;
    if (!q) { list.classList.remove('open'); return; }
    const matches = Object.entries(data).filter(([k, d]) => nomNorm(d.nom).includes(q));
    if (!matches.length) { list.classList.remove('open'); return; }
    list.innerHTML = matches.map(([k, d]) =>
      `<div class="autocomplete-item" data-key="${k}" onclick="selectNom('${k}','${d.nom.replace(/'/g,"\\'")}')">
        ${d.nom} <span class="tag-existing">déjà condamné</span>
      </div>`
    ).join('');
    list.classList.add('open');
  };

  window.onNomKey = function(e) {
    const items = document.querySelectorAll('#autocomplete-list .autocomplete-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { acIndex = Math.min(acIndex+1, items.length-1); highlightAc(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { acIndex = Math.max(acIndex-1,0); highlightAc(items); e.preventDefault(); }
    else if (e.key === 'Enter' && acIndex >= 0) { items[acIndex].click(); e.preventDefault(); }
    else if (e.key === 'Escape') document.getElementById('autocomplete-list').classList.remove('open');
  };
  function highlightAc(items) { items.forEach((it,i) => it.classList.toggle('selected', i===acIndex)); }

  window.selectNom = function(key, nom) {
    const el = document.getElementById('inp-nom');
    el.value = nom; el.dataset.existingKey = key;
    document.getElementById('autocomplete-list').classList.remove('open');
    document.getElementById('inp-delit').focus();
  };
  document.addEventListener('click', e => { if (!e.target.closest('#nom-group')) document.getElementById('autocomplete-list').classList.remove('open'); });

  /* ── AJOUTER / CUMULER ── */
  window.ajouterOuCumuler = function() {
    const nomEl = document.getElementById('inp-nom');
    const nom = nomEl.value.trim();
    const delit = document.getElementById('inp-delit').value.trim();
    const val = parseFloat(document.getElementById('inp-val').value);
    const unit = document.getElementById('inp-unit').value;
    if (!nom) return showErr('Veuillez entrer un nom complet.');
    if (!delit) return showErr('Veuillez indiquer le chef d\'inculpation.');
    if (!val || val <= 0) return showErr('Durée invalide.');

    const existingKey = nomEl.dataset.existingKey;
    const doublon = !existingKey && Object.entries(data).find(([k,d]) => nomNorm(d.nom) === nomNorm(nom));
    const targetKey = existingKey || (doublon && doublon[0]);

    if (targetKey && data[targetKey]) {
      const entry = data[targetKey];
      const peines = [...(entry.peines || []), { delit, val, unit, effectuee: false }];
      update(ref(db, 'condamnes/'+targetKey), { peines });
    } else {
      push(dbRef, {
        nom: nom.replace(/\b\w/g, c => c.toUpperCase()),
        peines: [{ delit, val, unit, effectuee: false }],
        notes: '',
        date: new Date().toLocaleDateString('fr-FR')
      });
    }
    nomEl.value = ''; delete nomEl.dataset.existingKey;
    document.getElementById('inp-delit').value = '';
    document.getElementById('inp-val').value = '';
    document.getElementById('autocomplete-list').classList.remove('open');
  };

  /* ── TOGGLE PEINE EFFECTUÉE ── */
  window.togglePeine = function(key, index) {
    const entry = data[key];
    if (!entry || !entry.peines) return;
    const peines = entry.peines.map((p, i) => i === index ? { ...p, effectuee: !p.effectuee } : p);
    update(ref(db, 'condamnes/'+key), { peines });
  };

  /* ── DÉTAIL TOGGLE ── */
  window.toggleDetail = function(key) {
    const row = document.getElementById('detail-'+key);
    const btn = document.getElementById('toggle-'+key);
    if (!row) return;
    const isOpen = row.classList.contains('open');
    row.classList.toggle('open', !isOpen);
    btn.classList.toggle('open', !isOpen);
    btn.textContent = isOpen ? '▼ Détails' : '▲ Fermer';
  };

  /* ── AJOUTER PEINE DEPUIS DÉTAIL ── */
  window.ajouterPeine = function(key) {
    const delitEl = document.getElementById('ad-'+key);
    const valEl   = document.getElementById('av-'+key);
    const unitEl  = document.getElementById('au-'+key);
    const val = parseFloat(valEl.value);
    if (!val || val <= 0) return;
    const delit = delitEl.value.trim() || 'Non précisé';
    const entry = data[key];
    const peines = [...(entry.peines||[]), { delit, val, unit: unitEl.value, effectuee: false }];
    update(ref(db, 'condamnes/'+key), { peines });
    valEl.value = ''; delitEl.value = '';
  };

  window.saveNote = function(key) {
    update(ref(db, 'condamnes/'+key), { notes: document.getElementById('note-'+key).value });
  };

  window.supprimerPersonne = function(key) {
    if (confirm('Supprimer définitivement ce condamné du registre ?')) remove(ref(db, 'condamnes/'+key));
  };

  /* ── STATS GLOBALES ── */
  function updateStats() {
    const entries = Object.values(data);
    document.getElementById('stat-total').textContent = entries.length;
    let totalP = 0, totalRestant = 0, totalPurge = 0;
    entries.forEach(d => {
      const t = calcTotaux(d.peines);
      totalP += (d.peines||[]).length;
      totalRestant += t.restant;
      totalPurge += t.purge;
    });
    document.getElementById('stat-peines').textContent = totalP;
    document.getElementById('stat-restant').textContent = formatTotal(totalRestant);
    document.getElementById('stat-purge').textContent = formatTotal(totalPurge);
  }

  /* ── RENDER ── */
  window.renderTable = function() {
    const q = document.getElementById('search').value.toLowerCase();
    const entries = Object.entries(data).filter(([k,d]) => d.nom.toLowerCase().includes(q));
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty-msg');
    const table = document.getElementById('main-table');
    document.getElementById('count-label').textContent = entries.length + ' condamné(s)';

    if (!entries.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      table.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    table.style.display = 'table';

    tbody.innerHTML = entries.map(([key, d], i) => {
      const peines = d.peines || [];
      const { total, purge, restant } = calcTotaux(peines);

      /* Badges pour la ligne principale */
      const peinesHtml = peines.map(p => {
        const m = toMois(p.val, p.unit);
        const cls = p.effectuee ? 'badge-done' : badgeClass(m);
        return `<span class="badge ${cls}">${p.delit}: ${p.val} ${p.unit}</span>`;
      }).join('');

      /* Lignes de peines dans le détail */
      const peinesDetailHtml = peines.map((p, pi) => {
        const done = p.effectuee;
        return `
          <div class="peine-line ${done ? 'done' : ''}">
            <span class="peine-delit ${done ? 'done-text' : ''}">${p.delit}</span>
            <span class="peine-duree ${done ? 'done-text' : ''}">${p.val} ${p.unit}</span>
            <span class="peine-status-badge ${done ? 'psb-effectuee' : 'psb-encours'}">${done ? '✓ Effectuée' : '⧖ En cours'}</span>
            <button class="btn-toggle-peine ${done ? 'to-encours' : 'to-done'}"
              onclick="event.stopPropagation();togglePeine('${key}',${pi})">
              ${done ? '↩ Remettre en cours' : '✓ Marquer effectuée'}
            </button>
          </div>`;
      }).join('');

      /* Résumé totaux dans le détail */
      const totalBox = `
        <div class="total-detail-box">
          <div class="tdb-item"><div class="tdb-label">Total prononcé</div><div class="tdb-val col-total">${formatTotal(total)}</div></div>
          <div class="tdb-item"><div class="tdb-label">Purgé</div><div class="tdb-val col-done">${formatTotal(purge)}</div></div>
          <div class="tdb-item"><div class="tdb-label">Restant à purger</div><div class="tdb-val col-rest">${formatTotal(restant)}</div></div>
        </div>`;

      /* Colonne total dans le tableau */
      const totalCell = `
        <div class="total-wrap">
          <span class="total-restant">${formatTotal(restant)}</span>
          ${purge > 0 ? `<span class="total-sub">${formatTotal(purge)} purgé${purge > 0 ? '' : ''}</span>` : ''}
        </div>`;

      return `
        <tr class="main-row" onclick="toggleDetail('${key}')">
          <td class="td-num">${i+1}</td>
          <td class="td-nom">${d.nom}<br><span class="date-sub">${d.date||''}</span></td>
          <td>${peinesHtml}</td>
          <td>${totalCell}</td>
          <td><button class="toggle-btn" id="toggle-${key}" onclick="event.stopPropagation();toggleDetail('${key}')">▼ Détails</button></td>
        </tr>
        <tr class="detail-row" id="detail-${key}">
          <td class="detail-cell" colspan="5">
            <div class="detail-inner">

              <div class="peines-block">
                <div class="block-title">Détail des peines</div>
                ${peinesDetailHtml}
                ${totalBox}
                <div style="margin-top:12px;">
                  <button class="btn-del" onclick="supprimerPersonne('${key}')">✕ Supprimer du registre</button>
                </div>
              </div>

              <div class="add-block">
                <div class="block-title">Ajouter une peine supplémentaire</div>
                <div class="add-inline">
                  <input type="text" id="ad-${key}" placeholder="Délit" onclick="event.stopPropagation()" />
                  <input type="number" id="av-${key}" min="1" placeholder="N" onclick="event.stopPropagation()" />
                  <select id="au-${key}" onclick="event.stopPropagation()">
                    <option value="mois">Mois</option>
                    <option value="ans">Ans</option>
                    <option value="jours">Jours</option>
                  </select>
                  <button class="btn-small" onclick="event.stopPropagation();ajouterPeine('${key}')">+ Ajouter</button>
                </div>
              </div>

              <div class="notes-block">
                <div class="block-title">Notes / Observations</div>
                <textarea id="note-${key}" onclick="event.stopPropagation()" placeholder="Comportement en détention, remises de peine...">${d.notes||''}</textarea><br>
                <button class="btn-save-note" onclick="event.stopPropagation();saveNote('${key}')">Sauvegarder</button>
              </div>

            </div>
          </td>
        </tr>`;
    }).join('');
  };
</script>
</body>
</html>
